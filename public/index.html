<!DOCTYPE html>
<html lang="es" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal — Coyote</title>
    <script>
      (function () {
        var t = localStorage.getItem("coyote-theme") || "dark";
        document.documentElement.setAttribute("data-theme", t);
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand-group">
        <button
          type="button"
          id="btn-sidebar-toggle"
          class="sidebar-mobile-toggle hidden"
          aria-label="Abrir menú"
          title="Abrir menú"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        <button type="button" id="btn-brand-icon" class="btn-icon" aria-label="Ir al inicio">
          <svg
            class="brand-icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 40 40"
            width="38"
            height="38"
            aria-hidden="true"
          >
            <path d="M20 2 L35 8 L35 23 Q35 34 20 39 Q5 34 5 23 L5 8 Z" fill="#4ade80"/>
            <path d="M20 6.5 L31 11 L31 23 Q31 31.5 20 35.5 Q9 31.5 9 23 L9 11 Z" fill="#86efac"/>
            <rect x="16.5" y="13.5" width="7" height="16" rx="2" fill="white"/>
            <rect x="12" y="18" width="16" height="7" rx="2" fill="white"/>
          </svg>
        </button>
        <span class="brand">Coyote — Portal médico</span>
        <button type="button" id="btn-home" class="btn-icon btn-home" aria-label="Inicio" title="Ir al inicio">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" width="18" height="18" fill="currentColor" aria-hidden="true">
            <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h3a1 1 0 001-1v-3h2v3a1 1 0 001 1h3a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/>
          </svg>
        </button>
      </div>
      <div class="topbar-right">
        <button
          type="button"
          id="btn-theme"
          class="theme-toggle"
          aria-label="Cambiar tema"
          title="Cambiar tema"
        >
          <span class="theme-icon">🌙</span>
        </button>
      </div>
    </header>
    <div class="layout">
      <aside id="sidebar" class="sidebar hidden">
        <nav class="sidebar-nav">
          <a href="#/" class="sidebar-link" data-route="dashboard">
            <span class="sidebar-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg></span>
            <span class="sidebar-label">Dashboard</span>
          </a>
          <a href="#/conversations" class="sidebar-link" data-route="conversations">
            <span class="sidebar-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg></span>
            <span class="sidebar-label">Conversaciones</span>
          </a>
        </nav>
        <div class="sidebar-footer">
          <button
            type="button"
            id="btn-sidebar-collapse"
            class="sidebar-collapse-btn"
            aria-label="Colapsar menú"
            title="Colapsar menú"
          >
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            <span class="sidebar-label">Colapsar</span>
          </button>
          <button type="button" id="btn-change-password" class="sidebar-action">
            <span class="sidebar-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg></span>
            <span class="sidebar-label">Cambiar contraseña</span>
          </button>
          <button type="button" id="btn-logout" class="sidebar-logout">
            <span class="sidebar-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg></span>
            <span class="sidebar-label">Cerrar sesión</span>
          </button>
        </div>
      </aside>
      <div id="sidebar-backdrop" class="sidebar-backdrop hidden"></div>
      <div class="layout-main">
        <main id="app" class="container"></main>
      </div>
    </div>
    <script src="/config.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
